name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            musl: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            musl: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: rustup show # installs toolchain from rust-toolchain.toml
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - run: tar czf rsh-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release rsh
      - uses: actions/upload-artifact@v4
        with:
          name: rsh-${{ matrix.target }}
          path: rsh-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: gh release create "$GITHUB_REF_NAME" rsh-*.tar.gz --generate-notes --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
